<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nadiya Love Galaxy</title>
  <style>
    :root{
      --bg1:#05060d;
      --bg2:#15091f;
      --text:#f8f2ff;
      --soft:rgba(255,255,255,.78);
      --accent1:#ff975c;
      --accent2:#ff63b8;
      --accent3:#ffd77b;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      font-family:Inter,Arial,Helvetica,sans-serif;color:var(--text);
      background:
        radial-gradient(circle at 50% 54%, rgba(255,151,92,.42), transparent 12%),
        radial-gradient(circle at 50% 50%, rgba(255,99,184,.16), transparent 24%),
        radial-gradient(circle at 50% 50%, rgba(255,215,123,.08), transparent 34%),
        linear-gradient(180deg,var(--bg1),var(--bg2));
    }
    #app{position:relative;width:100%;height:100%;overflow:hidden}
    #scene{position:absolute;inset:0;cursor:grab;user-select:none;touch-action:none}
    #scene.dragging{cursor:grabbing}
    .stars,.labels{position:absolute;inset:0;pointer-events:none}
    .star{
      position:absolute;border-radius:50%;background:rgba(255,255,255,.95);
      box-shadow:0 0 10px rgba(255,255,255,.55);animation:twinkle linear infinite;
    }
    @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.4)}}
    .label{
      position:absolute;left:0;top:0;transform:translate(-50%,-50%);
      white-space:nowrap;padding:6px 11px;border-radius:999px;
      border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);
      backdrop-filter:blur(8px);letter-spacing:.02em;text-shadow:0 0 8px rgba(255,255,255,.08);
      box-shadow:0 0 12px rgba(255,255,255,.05), 0 0 24px rgba(255,99,184,.08);
      will-change:transform,opacity,left,top;
    }
    .label::before{content:"✦";margin-right:6px;color:rgba(255,220,140,.95);font-size:.9em}
    .center-wrap{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      width:min(30vw,260px);height:min(30vw,260px);min-width:170px;min-height:170px;pointer-events:none;
    }
    .center-glow{
      position:absolute;inset:0;border-radius:50%;
      background:
        radial-gradient(circle at 42% 36%, rgba(255,246,225,.98), rgba(255,210,110,.92) 16%, rgba(255,151,92,.96) 43%, rgba(255,99,184,.54) 72%, rgba(255,99,184,.03) 100%);
      box-shadow:0 0 28px rgba(255,151,92,.8),0 0 90px rgba(255,99,184,.36),0 0 160px rgba(255,151,92,.22);
      animation:pulse 5s ease-in-out infinite;
    }
    .center-glow::after{
      content:"";position:absolute;inset:-28px;border-radius:50%;
      border:1px solid rgba(255,255,255,.06);animation:ringPulse 6s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(.98)}50%{transform:scale(1.04)}}
    @keyframes ringPulse{0%,100%{opacity:.25;transform:scale(.96)}50%{opacity:.72;transform:scale(1.08)}}
    .center-core{
      position:absolute;inset:18%;border-radius:50%;background:rgba(9,10,22,.9);
      border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;
      text-align:center;padding:18px;box-shadow:inset 0 0 24px rgba(255,255,255,.04);
    }
    .center-core h1{
      margin:0;font-size:clamp(1.1rem,2.3vw,1.8rem);line-height:1.15;letter-spacing:.08em;text-transform:uppercase
    }
    .top-note,.bottom-note{
      position:absolute;left:50%;transform:translateX(-50%);width:min(94vw,900px);text-align:center;pointer-events:none;
    }
    .top-note{
      top:14px;font-size:12px;letter-spacing:.10em;text-transform:uppercase;color:rgba(255,255,255,.62);
    }
    .bottom-note{
      bottom:14px;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);color:rgba(255,255,255,.78);
      font-size:13px;line-height:1.4;
    }
    .edit-note{
      position:absolute;right:14px;top:14px;padding:10px 12px;border-radius:14px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.78);
      font-size:12px;line-height:1.45;max-width:290px;
    }
    @media (max-width:760px){
      .center-wrap{width:min(46vw,240px);height:min(46vw,240px)}
      .bottom-note{display:none}
      .edit-note{display:none}
    }
  </style>
</head>
<body>
<div id="app">
  <div class="stars" id="stars"></div>
  <div class="top-note">Drag with the mouse to rotate around Nadiya • Wheel to zoom</div>

  <div id="scene">
    <div class="labels" id="labels"></div>
    <div class="center-wrap">
      <div class="center-glow"></div>
      <div class="center-core"><h1 id="centerName">Nadiya</h1></div>
    </div>
  </div>

  <div class="edit-note">
    Edit only 2 parts in the code:<br>
    <b>const CENTER_NAME</b><br>
    <b>const LOVE_ITEMS</b>
  </div>

  <div class="bottom-note">A galaxy made of everything I love about you.</div>
</div>

<script>
const CENTER_NAME = "Nadiya";

const LOVE_ITEMS = [
  "I love Your smile",
  "I love the gesture you make with your lips.",
  "I miss the first time i hugged you",
  "I remember the first kiss i gave you in my car.",
  "I love ur lips"
];

const starsEl = document.getElementById("stars");
const labelsEl = document.getElementById("labels");
const centerNameEl = document.getElementById("centerName");
const scene = document.getElementById("scene");
centerNameEl.textContent = CENTER_NAME;

let labels = [];
let points = [];
let currentRotX = -0.45;
let currentRotY = 0.65;
let targetRotX = currentRotX;
let targetRotY = currentRotY;
let zoom = 1;
let dragging = false;
let lastX = 0;
let lastY = 0;

function seeded(index, salt){
  const x = Math.sin(index * 127.1 + salt * 311.7) * 43758.5453123;
  return x - Math.floor(x);
}
function clamp(value, min, max){ return Math.max(min, Math.min(max, value)); }

function createStars(){
  for(let i = 0; i < 180; i++){
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2.3 + 1;
    s.style.width = size + "px";
    s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.opacity = (Math.random() * 0.8 + 0.15).toFixed(2);
    s.style.animationDuration = (Math.random() * 4 + 2) + "s";
    s.style.animationDelay = (Math.random() * 4) + "s";
    starsEl.appendChild(s);
  }
}

function buildGalaxy(items){
  labelsEl.innerHTML = "";
  points = items.map((text, i) => {
    const n = Math.max(items.length, 1);
    const t = i / n;
    const armCount = 4;
    const arm = i % armCount;
    const spiralTurns = 5.2;
    const angle = t * Math.PI * 2 * spiralTurns + arm * (Math.PI * 2 / armCount) + seeded(i, 1) * 0.55;
    const radius = 110 + t * 340 + seeded(i, 2) * 45;
    const sphereMix = 0.55 + seeded(i, 6) * 0.45;
    const x = Math.cos(angle) * radius * sphereMix + (seeded(i, 3) - 0.5) * 34;
    const z = Math.sin(angle) * radius * sphereMix + (seeded(i, 4) - 0.5) * 34;
    const y = Math.sin(angle * 1.35) * (80 + t * 60) + (seeded(i, 5) - 0.5) * 70;
    return { text, x, y, z };
  });

  labels = points.map((p, index) => {
    const div = document.createElement("div");
    div.className = "label";
    div.textContent = p.text;
    div.style.color = [
      "rgba(255,255,255,.86)",
      "rgba(255,226,242,.84)",
      "rgba(255,237,192,.83)",
      "rgba(222,236,255,.84)"
    ][index % 4];
    labelsEl.appendChild(div);
    return div;
  });
}

function render(){
  requestAnimationFrame(render);

  if(!dragging){
    targetRotY += 0.0034;
    targetRotX += Math.sin(Date.now() * 0.00045) * 0.0008;
  }

  currentRotX += (targetRotX - currentRotX) * 0.12;
  currentRotY += (targetRotY - currentRotY) * 0.12;

  const w = window.innerWidth;
  const h = window.innerHeight;
  const cx = w / 2;
  const cy = h / 2;
  const perspective = 980 / zoom;
  const sinY = Math.sin(currentRotY), cosY = Math.cos(currentRotY);
  const sinX = Math.sin(currentRotX), cosX = Math.cos(currentRotX);

  for(let i = 0; i < points.length; i++){
    const p = points[i];
    const x1 = p.x * cosY - p.z * sinY;
    const z1 = p.x * sinY + p.z * cosY;
    const y2 = p.y * cosX - z1 * sinX;
    const z2 = p.y * sinX + z1 * cosX;
    const denom = perspective - z2;
    const scale = clamp(perspective / Math.max(140, denom), 0.34, 2.45);
    const sx = cx + x1 * scale;
    const sy = cy + y2 * scale;
    const alpha = clamp(0.18 + ((z2 + 500) / 1000) * 0.82, 0.12, 1);
    const blur = clamp((1 - scale) * 1.25, 0, 1.5);
    const label = labels[i];
    label.style.left = sx + "px";
    label.style.top = sy + "px";
    label.style.opacity = alpha.toFixed(3);
    label.style.transform = `translate(-50%, -50%) scale(${scale.toFixed(3)})`;
    label.style.filter = `blur(${blur.toFixed(2)}px)`;
    label.style.zIndex = String(Math.round(z2 + 1000));
  }
}

scene.addEventListener("pointerdown", (e) => {
  dragging = true;
  scene.classList.add("dragging");
  lastX = e.clientX;
  lastY = e.clientY;
  scene.setPointerCapture(e.pointerId);
});
scene.addEventListener("pointermove", (e) => {
  if(!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  targetRotY += dx * 0.009;
  targetRotX += dy * 0.009;
  targetRotX = clamp(targetRotX, -1.35, 1.35);
});
function stopDrag(){
  dragging = false;
  scene.classList.remove("dragging");
}
scene.addEventListener("pointerup", stopDrag);
scene.addEventListener("pointercancel", stopDrag);
scene.addEventListener("wheel", (e) => {
  e.preventDefault();
  zoom += e.deltaY * 0.0012;
  zoom = clamp(zoom, 0.72, 1.55);
}, { passive: false });

createStars();
buildGalaxy(LOVE_ITEMS);
render();
</script>
</body>
</html>
